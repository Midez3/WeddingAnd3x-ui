user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ---- FRONTEND + XUI ----
    # HTTP: порт 80
    server {
        listen 80;
        server_name wepopiks.com panelVpn.wepopiks.com;

        # Let’s Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Frontend HTTP
        location / {
            proxy_pass http://frontend:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # XUI HTTP
        location /panel/ {
            proxy_pass http://127.0.0.1:45000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Frontend HTTPS
    server {
        listen 443 ssl;
        server_name wepopiks.com;

        ssl_certificate /etc/letsencrypt/live/wepopiks.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wepopiks.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://frontend:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # XUI HTTPS
    server {
        listen 443 ssl;
        server_name panelVpn.wepopiks.com;

        ssl_certificate /etc/letsencrypt/live/panelVpn.wepopiks.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/panelVpn.wepopiks.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location /panel/ {
            proxy_pass http://127.0.0.1:45000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}