user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # HTTP для всех доменов — редирект на HTTPS
    server {
        listen 80;
        server_name wepopiks.com www.wepopiks.com panelvpn.wepopiks.com;

        # Let’s Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        return 301 https://$host$request_uri;
    }

    # FRONTEND HTTPS
    server {
        listen 443 ssl;
        server_name wepopiks.com www.wepopiks.com;

        ssl_certificate /etc/letsencrypt/live/wepopiks.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wepopiks.com/privkey.pem;

        location / {
            proxy_pass http://frontend:9090;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # XUI HTTPS
