version: "3.9"

services:
  frontend:
    build:
      context: ./wedding.frontend
      dockerfile: Dockerfile
    container_name: weddingand3x-ui-frontend-1
    ports:
      - "9090:9090"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/ || exit 1"]
      interval: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge