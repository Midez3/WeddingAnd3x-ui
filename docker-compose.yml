version: "3.9"

services:
  frontend:
    image: your-frontend-image
    container_name: weddingand3x-ui-frontend-1
    ports:
      - "9090:9090"
    networks:
      - app_network

#  xui:
#    image: your-xui-image
#    container_name: weddingand3x-ui-xui-1
#    ports:
#      - "45000:45000"
#    networks:
#      - app_network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
#      - xui
    networks:
      - app_network

networks:
  app_network:
    driver: bridge